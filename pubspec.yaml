name: antigravity_command_center
description: Mobile command and control center for Google Antigravity.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  http: ^1.2.0
  web_socket_channel: ^2.4.1
  shared_preferences: ^2.2.2
  flutter_markdown: ^0.6.18+1
  google_fonts: ^6.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    # Si requerimos assets locales
    - assets/images/
